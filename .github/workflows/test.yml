name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install build
      - run: python -m build
      - run: python -m pip install --force-reinstall --no-deps dist/sessionark-0.1.0-py3-none-any.whl
      - run: python -m unittest discover -s tests -v
      - run: python -m sessionark --version
